pre-commit:
  parallel: true
  commands:
    lint-format:
      glob: "*.{ts,tsx,svelte,json}"
      run: npx biome check --write {staged_files} && git add {staged_files}
    typecheck:
      glob: "{src,packages}/**/*.ts"
      run: npx tsc --noEmit
    typecheck-templates:
      glob: "templates/**/*.ts"
      run: npx tsx scripts/typecheck-templates.ts
    typecheck-frontend:
      glob: "packages/daemon/src/web/ui/**/*.{ts,svelte}"
      run: npx svelte-check --tsconfig packages/daemon/src/web/ui/tsconfig.json

pre-push:
  parallel: true
  commands:
    test:
      run: npm test
    svelte-check:
      run: npx svelte-check --tsconfig packages/daemon/src/web/ui/tsconfig.json
